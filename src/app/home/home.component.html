<div class="titulo">
    <h2 class="lato-regular-bold">Eneko Rebollo Hernández</h2>
    <p class="descargar lato-italic">Descarga mi CV</p>
</div>
<div class="grid">
    <div class="flex">
        <fa-icon [icon]="faEmail"></fa-icon>
        <p class="lato-regular-italic">enekorebollo&#64;gmail.com</p>
    </div>
    
    <div class="flex">
        <fa-icon [icon]="faPhone"></fa-icon>
        <p class="lato-regular-italic">+64 639914542</p>
    </div>
</div>

<div class="summary">
    <h3 class="lato-bold">Desarrollador Back-end actualmente aprendiendo para ser Full-Stack.</h3>
</div>

<div class="grid experiencia">
    <div class="flex">
        <fa-icon size="2x" [icon]="faWork"></fa-icon>
        <h2>Experiencia</h2>
    </div>
    <div class="experiencias">
        <div *ngFor="let exp of experiencias" class="skill-card">
            <header class="skill-card__header">
              <img src={{exp.Foto}} alt={{exp.Nombre}} class="skill-card__icon">
            </header>
            <section class="skill-card__body">
              <h2 class="skill-card__title">{{exp.Nombre}}</h2>
              <span class="skill-card__duration">{{exp.ExtraInfo}}</span>
              <ul class="skill-card__knowledge">
                <li *ngFor="let skill of exp.Skills">{{skill}}</li>
              </ul>
            </section>
          </div>
    </div>
</div>

<div class="skills">
    <div class="grid">
        <div class="flex">
            <fa-icon size="2x" [icon]="faTitulitis"></fa-icon>
            <h2>Titulaciones</h2>
        </div>
        <p>doufhsdofh</p>
    </div>
    <div class="grid">
        <div class="flex">
            <fa-icon size="2x" [icon]="faBrain"></fa-icon>
            <h2>Lenguajes</h2>
        </div>
        <p>dadlfhaf</p>
    </div>
</div>
