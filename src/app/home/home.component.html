<div class="titulo">
    <h2 class="lato-regular-bold">Eneko Rebollo Hernández</h2>
    <p class="descargar lato-italic">Descarga mi CV</p>
</div>
<div class="grid">
    <div class="flex">
        <fa-icon [icon]="faEmail"></fa-icon>
        <p class="lato-regular-italic">enekorebollo&#64;gmail.com</p>
    </div>
    
    <div class="flex">
        <fa-icon [icon]="faPhone"></fa-icon>
        <p class="lato-regular-italic">+64 639914542</p>
    </div>
</div>

<div class="summary">
    <h3 class="lato-bold">Desarrollador Back-end actualmente aprendiendo para ser Full-Stack.</h3>
</div>

<div class="grid experiencia">
    <div class="flex">
        <fa-icon size="2x" [icon]="faWork"></fa-icon>
        <h2>Experiencia</h2>
    </div>
    <div class="experiencias">
        <div *ngFor="let item of experiencias" class="card">
            <div class = image>
              <img href = "#" src ={{item.Foto}} alt={{item.Nombre}}>
            </div>
            <div class = content>
              <h3>{{item.Nombre}}</h3>
              <ul>
                <li *ngFor="let exp of item.Skills">{{exp}}</li>
              </ul>
            </div>
          </div>    
    </div>
</div>

<div class="skills">
    <div class="grid">
        <div class="flex">
            <fa-icon size="2x" [icon]="faTitulitis"></fa-icon>
            <h2>Titulaciones</h2>
        </div>
        <p>doufhsdofh</p>
    </div>
    <div class="grid">
        <div class="flex">
            <fa-icon size="2x" [icon]="faBrain"></fa-icon>
            <h2>Tecnologias</h2>
        </div>
        <img *ngFor="let tech of lenguajes" src="https://img.shields.io/badge/{{tech}}.svg?style=plastic&logo={{tech}}&logoColor=white" alt={{tech}}/>
    </div>
</div>
