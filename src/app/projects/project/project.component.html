<div (click)="onClick()" class="card hidden" id="{{id}}" (mouseenter)="onHover()" (mouseleave)="onLeave()">
  <img class="background" src="/assets{{project.Imagen}}" alt="Image">
  <div class="card-content hidden" id="c{{id}}">
    <h3>{{project.Nombre}}</h3>
    <p class="description">{{project.Info}}</p>
  </div>
</div>
