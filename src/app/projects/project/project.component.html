<div class="card hidden" id="{{id}}" (mouseenter)="onHover()" (mouseleave)="onLeave()">
  <img class="background" src="/assets{{imagen}}" alt="Image">
  <div class="card-content hidden" id="c{{id}}">
    <h3>{{titulo}}</h3>
    <p class="description">{{descripcion}}</p>
    <ul>
      <li *ngFor="let tec of tecnologias">{{tec}}</li>
    </ul>
  </div>
</div>
